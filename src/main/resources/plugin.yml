name: NoCPVP
version: '1.0'
main: io.github.Earth1283.noCPVP.NoCPVP
api-version: '1.21'
load: STARTUP
authors: [ Earth1283 ]
description: "Disables crystal PVP"

commands:
  nocpvp:
    description: NoCPVP management command
    usage: /nocpvp reload
    permission: nocpvp.reload

permissions:
  nocpvp.reload:
    description: Allows reloading the NoCPVP config
    default: op
